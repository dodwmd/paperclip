services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    volumes:
      - paperclip-test-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip"]
      interval: 5s
      timeout: 5s
      retries: 10

  paperclip:
    image: localhost/paperclip-test:latest
    ports:
      - "${PAPERCLIP_PORT:-3200}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_INSTANCE_ID: "test"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3200}"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "true"
      BETTER_AUTH_SECRET: "test-secret-for-local-dev-only-not-production"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      DATABASE_URL: "postgres://paperclip:paperclip@db:5432/paperclip"
    volumes:
      - paperclip-test-data:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  paperclip-test-db:
  paperclip-test-data:
